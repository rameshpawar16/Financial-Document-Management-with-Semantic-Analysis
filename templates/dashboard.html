<!doctype html>
<html>
<head>
<title>Document AI Assistant</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>

    <body>
        <div class="topbar">
    <div class="title">Document Assistant</div>

        <div class="menu">
            <button id="menuBtn" onclick="toggleMenu()" title="Menu">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>

            <div id="menuDropdown" class="dropdown hidden">
                <div style="display:flex; align-items:center; gap:10px; padding:10px;">
                    <div id="avatarCircle" class="avatar-circle">
                        <span id="avatarLetter">U</span>
                    </div>
                    <div id="currentUser" style="font-weight:bold; padding:0;"></div>
                </div>
                <hr style="margin:0; border:none; border-top:1px solid #ddd;">
                <div id="addRoleBtn">Add Role</div>
                <div id="logoutBtn">Logout</div>
            </div>
        </div>
    </div>

        <div class="container">
        <div class="sidebar">
            <button id="newChatBtn" onclick="startNewChat()" class="new-chat-btn">+ New Chat</button>
            <h3>Chat History</h3>
            <ul id="history"></ul>
        </div>
        <!-- MAIN -->
        <div class="main">

        <h2>Upload Document</h2>

        <input type="file" id="file">
        <button onclick="uploadDoc()" style="background:#3498db; color:white; border:none; padding:8px 16px; border-radius:4px; cursor:pointer;">Upload</button>
        <button id="deleteDocsBtn" onclick="showDocuments()" style="display:none; margin-left:8px; background:#e74c3c; color:white; border:none; padding:8px 16px; border-radius:4px; cursor:pointer;">Delete Documents</button>
        <div id="status"></div>

        <!-- Delete Documents for Admin only -->
        <div id="docListPanel" style="display:none; margin-top:15px;">
            <h3>All Documents <button onclick="hideDocuments()" style="margin-left:10px; font-size:12px; cursor:pointer;">&times; Close</button></h3>
            <div id="docList"></div>
        </div>
        <hr>

        <!-- Chat Section -->
        <h2>Ask Question</h2>
        <div class="chat-container">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-bar">
                <input type="text" id="question" placeholder="Ask about your document..." onkeypress="if(event.key==='Enter') askQuestion()">
                <button onclick="askQuestion()" class="send-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="loader" style="display:none;"></div>

        </div>
        </div>

    <link rel="stylesheet" href="/static/dashboard.css?v=5">
    <script src="/static/dashboard.js?v=6"></script>

    </body>
</html>
